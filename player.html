<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STREAMVAULT Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .player-container {
            width: 100%;
            height: 100vh;
            position: relative;
            background: black;
        }
        .video-js {
            width: 100%;
            height: 100%;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: rgba(0,224,255,0.8);
            color: #000;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="player-container">
    <video id="player" class="video-js vjs-big-play-centered" controls autoplay preload="auto">
        <p class="vjs-no-js">Please enable JavaScript.</p>
    </video>
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
    <div class="info" id="channelName"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('url');
    const title = urlParams.get('title') || 'Live Stream';

    if(streamUrl) {
        document.getElementById('channelName').innerText = title;
        const player = videojs('player', {
            liveui: true,
            html5: { vhs: { overrideNative: true } },
            autoplay: true,
            controls: true
        });
        player.src({ src: streamUrl, type: 'application/x-mpegURL' });
        player.play().catch(e => console.warn(e));
    } else {
        document.getElementById('channelName').innerText = 'No stream URL provided';
    }
</script>
</body>
</html>
